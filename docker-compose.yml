services:
  its-personal:
    build: .
    network_mode: host
    env_file:
      - path: .env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 3009
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kuala_Lumpur}
      TZ: ${APP_TIMEZONE:-Asia/Kuala_Lumpur}
      DATABASE_PATH: /data/its-personal.sqlite
      ATTACHMENT_DIR: /attachments
    volumes:
      - planner-data:/data
      - planner-attachments:/attachments
    restart: unless-stopped

volumes:
  planner-data:
  planner-attachments:
